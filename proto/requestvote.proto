syntax = "proto3";
package vote;

service Greeter {
    rpc SayHello (VoteRequest) returns (VoteReply);
}

message VoteRequest {
   int32 term = 1;
   int32 candidateId = 2;
   int32 lastLogIndex = 3;
   int32 lastLogTerm = 4;
}

// Request:
// term
// candidateId
// lastLogIndex
// lastLogTerm

message VoteReply {
    int32 term = 1;
    bool voteGranted = 2;
}

// Response:
// term
// voteGranted
