syntax = "proto3";
package raft_service;

service RaftService{
    rpc Client (ClientRequest) returns (ClientReply);
	rpc AppendEntries (AppendRequest) returns (AppendReply);
	rpc VoteMe (VoteRequest) returns (VoteReply);
	rpc Membership (MembershipRequest) returns (MembershipReply);
}


// Client Entries
// Client code:
// 1. ping
// 2. get <nama-key>
// 3. set <nama-key> <value>
// 4. strln <nama-key>
// 5. del <nama-key>
// 6. append <nama-key> <value>
// 7. change <ip-dadr> <port>
message ClientRequest { 
	int32 type = 1;
  optional string key = 2;
  optional string val = 3;
  optional string ip = 4;
  optional string port = 5;
}

message ClientReply { 
	string message = 1; 
}

// Append Entries 
message Entries {
	bool isSet = 2;
	bool isDel = 3;
	bool isAppend = 4;
	string key = 5;
	string value = 6;
}

message AppendRequest {
  int32 term = 1;
  int32 leaderId = 2;
  int32 prevLogIndex = 3;
  int32 prevLogTerm = 4;
  int32 leaderCommit = 5;
  repeated Entries entries = 6;
  repeated Address cluster_addr_list = 7;
}
message AppendReply {
    int32 term = 1;
    bool success = 2;
}

// Vote Request
message VoteRequest {
	  int32 term = 1;
	  int32 candidateId = 2;
	  int32 lastLogIndex = 3;
	  int32 lastLogTerm = 4;
 }
 message VoteReply {
	  int32 term = 1;
    bool voteGranted = 2;
 }

// Append Entries 
message MembershipRequest {
	string ipAddr = 1;
	string port = 2;
}

message MembershipReply { 
	string ipAddr  = 1;
	string port = 2;
	bool status = 3; // "redirected" -> 0 || "OK" -> 1
  int32 id = 4;
}

message Address {
  string ip = 1;
  string port = 2;
  int32 cluster_idx = 3;
}
