syntax = "proto3";
package raft_service;

service RaftService {
  rpc Execute(ExecuteRequest) returns (ExecuteReply);
  rpc RequestLog(RequestLogRequest) returns (RequestLogReply);

  rpc AppendEntries(AppendRequest) returns (AppendReply);
  rpc VoteMe(VoteRequest) returns (VoteReply);
  rpc Membership(MembershipRequest) returns (MembershipReply);
}

enum CommandType {
  CMD_UNKNOWN = 0;

  CMD_PING = 1;
  CMD_GET = 2;
  CMD_SET = 3;
  CMD_APPEND = 4;
  CMD_DEL = 5;
  CMD_STRLEN = 6;

  CMD_REMOVE_MEMBER = 7;

  CMD_REQUEST_LOG = 8;
}

message Address {
  string ip = 1;
  string port = 2;
  int32 cluster_idx = 3;
}

message ExecuteRequest {
  CommandType cmd = 1;
  string key = 2;
  string value = 3;
  int32 node_id = 4;
}

message ExecuteReply {
  bool ok = 1;
  string message = 2;

  bool redirect = 3;
  Address leader = 4;
}

message RequestLogRequest {}

message LogEntry {
  CommandType cmd = 1;
  string key = 2;
  string value = 3;
  int32 term = 4;
}

message RequestLogReply {
  bool ok = 1;

  bool redirect = 2;
  Address leader = 3;

  repeated LogEntry log = 4;
}

message AppendRequest {
  int32 term = 1;
  int32 leader_id = 2;

  int32 prev_log_index = 3;
  int32 prev_log_term = 4;

  int32 leader_commit = 5;

  repeated LogEntry entries = 6;

  repeated Address cluster_config = 7;
}

message AppendReply {
  int32 term = 1;
  bool success = 2;
}

message VoteRequest {
  int32 term = 1;
  int32 candidate_id = 2;
  int32 last_log_index = 3;
  int32 last_log_term = 4;
}

message VoteReply {
  int32 term = 1;
  bool vote_granted = 2;
}

message MembershipRequest {
  string ip_addr = 1;
  string port = 2;
}

message MembershipReply {
  bool ok = 1;

  Address leader = 2;

  int32 assigned_id = 3;
  repeated Address cluster_config = 4;
}

